---
# GitHub Actions workflow to run MegaLinter on all public repositories
# with .mega-linter.yml configuration file
# https://megalinter.io/
name: mega-linter-repos

on:
  workflow_dispatch:
    inputs:
      repository:
        type: string
        description: Specific repository name to scan (my-git-projects). Leave empty to scan all repos
        default: ""
      megalinter_flavor:
        type: choice
        description: MegaLinter flavor to use
        default: all
        options:
          - <all-flavors>
          - all
          - cupcake
          - documentation
          - dotnet
          - dotnetweb
          - go
          - java
          - javascript
          - php
          - python
          - ruby
          - rust
          - salesforce
          - security
          - swift
          - terraform

permissions:
  contents: read

env:
  REPO_OWNER: ${{ github.repository_owner }}

defaults:
  run:
    shell: bash -euo pipefail {0}

jobs:
  fetch-repos:
    runs-on: ubuntu-24.04-arm
    outputs:
      repos: ${{ steps.get-repos.outputs.repos }}
      flavors: ${{ steps.get-repos.outputs.flavors }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}
          permission-contents: read
          permission-metadata: read

      - name: Get repository list
        id: get-repos
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_REPOSITORY: ${{ inputs.repository }}
          INPUT_FLAVOR: ${{ inputs.megalinter_flavor }}
        run: |
          # Define all available MegaLinter flavors (sorted by image size, smallest first)
          ALL_FLAVORS='["formatters","ci_light","security","documentation","ruby","terraform","c_cpp","javascript","python","cupcake","all"]'

          # Get repository list
          if [[ -n "${INPUT_REPOSITORY}" ]]; then
            REPOS="[\"${INPUT_REPOSITORY}\"]"
            echo "Scanning specific repository: ${REPO_OWNER}/${INPUT_REPOSITORY}"
          else
            # Get all public, non-archived repos with .mega-linter.yml
            ALL_REPOS=$(gh repo list "${REPO_OWNER}" --no-archived --visibility public \
              --source --limit 1000 --json name --jq '[.[].name]')
            REPOS="[]"
            for NAME in $(echo "${ALL_REPOS}" | jq -r '.[]'); do
              if gh api "repos/${REPO_OWNER}/${NAME}/contents/.mega-linter.yml" --silent 2> /dev/null; then
                REPOS=$(echo "${REPOS}" | jq --arg name "${NAME}" '. + [$name] | sort')
              fi
            done
            echo "Found $(echo "${REPOS}" | jq 'length') repositories with .mega-linter.yml"
          fi

          # Get flavor list
          if [[ "${INPUT_FLAVOR}" == "<all-flavors>" ]]; then
            FLAVORS="${ALL_FLAVORS}"
            echo "Using all MegaLinter flavors"
          else
            FLAVORS="[\"${INPUT_FLAVOR:-all}\"]"
          fi
          echo "repos=$(echo "${REPOS}" | jq -c '.')" >> "${GITHUB_OUTPUT}"
          echo "flavors=$(echo "${FLAVORS}" | jq -c '.')" >> "${GITHUB_OUTPUT}"

  megalinter-parallel:
    needs: fetch-repos
    runs-on: ubuntu-latest
    name: "megalinter-${{ matrix.flavor }}-${{ matrix.repo }}"
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.fetch-repos.outputs.repos) }}
        flavor: ${{ fromJson(needs.fetch-repos.outputs.flavors) }}
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}
          permission-contents: read

      - name: Checkout ${{ matrix.repo }}
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: ${{ env.REPO_OWNER }}/${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 1
          persist-credentials: false

      - name: 💡 MegaLinter (${{ matrix.flavor }})
        uses: oxsecurity/megalinter@ef3e84b8b836d76db562d0f3ed7da61e8fd538bc # v9.6.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MEGALINTER_FLAVOR: ${{ matrix.flavor }}
          VALIDATE_ALL_CODEBASE: true
