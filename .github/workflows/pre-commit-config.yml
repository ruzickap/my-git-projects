name: pre-commit-config

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
      - "!chore/renovate/*"
    paths:
      - .pre-commit-config.yaml
      - .github/workflows/pre-commit-config.yml

env:
  SKIP: no-commit-to-branch
  # Use OpenTofu for the antonbabenko/pre-commit-terraform hooks
  PCT_TFPATH: tofu

defaults:
  run:
    shell: bash -euxo pipefail {0}

permissions: read-all

jobs:
  pre-commit-config:
    # brew is not available on ubuntu-24.04-arm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: 1.26

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install checkov using uv
        run: |
          # renovate: datasource=pypi depName=checkov
          uv tool install checkov==3.3.8
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Install tflint
        # tflint has no Linux Homebrew formula (the tap ships a macOS cask)
        uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0

      - name: Install dependencies
        run: |
          eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> "${GITHUB_PATH}"
          brew install actionlint betterleaks opentofu terraform-docs terrascan tfupdate trivy

          betterleaks version
          terrascan version
          tflint --version
          tfupdate --version
          tofu -version
          terraform-docs --version
          trivy version

      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d # v2.0.5
