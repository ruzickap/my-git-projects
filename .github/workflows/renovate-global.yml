---
# GitHub Actions workflow for global Renovate dependency management
# Renovate automatically updates dependencies across all non-archived repositories
name: renovate-global

on:
  workflow_dispatch:
    inputs:
      dryRun:
        type: boolean
        description: Dry-Run
  # schedule:
  #   - cron: 0 4-6 * * 0

env:
  # keep-sorted start block=yes
  # Automatically discover all repositories accessible by the token
  # https://docs.renovatebot.com/self-hosted-configuration/#autodiscover
  RENOVATE_AUTODISCOVER: "true"
  # Filter autodiscovery to only ${{ github.repository_owner }} repositories, with a few explicit exclusions
  # https://docs.renovatebot.com/self-hosted-configuration/#autodiscoverfilter
  RENOVATE_AUTODISCOVER_FILTER: >-
    [
    "!/^${{ github.repository_owner }}/old_stuff$/",
    "!/^${{ github.repository_owner }}/ruzickovabozena\\.xvx\\.cz$/",
    "!/^${{ github.repository_owner }}/wizcli-terraform-test$/",
    "/^${{ github.repository_owner }}\\/.*/"
    ]
  # Enable dry-run mode based on the workflow input (https://docs.renovatebot.com/self-hosted-configuration/#dryrun)
  RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || 'null' }}
  # Skip archived repositories
  # https://docs.renovatebot.com/self-hosted-configuration/#ignorearchived
  RENOVATE_IGNORE_ARCHIVED: "true"
  # Username for Renovate commits
  # https://docs.renovatebot.com/self-hosted-configuration/#username
  RENOVATE_USERNAME: ${{ github.repository_owner }}
  # keep-sorted end

permissions: read-all

jobs:
  renovate-global:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-checks: read
          permission-metadata: read
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - name: 💡 Self-hosted Renovate
        id: renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ steps.app-token.outputs.token }}
        env:
          # Write Renovate logs to a file (JSON format by default)
          # https://docs.renovatebot.com/config-overview/#special-environment-variables
          LOG_FILE: /tmp/renovate-log.json

      - name: 📝 Summarize Renovate output
        if: always()
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.MY_COPILOT_TOKEN }}
        run: |
          copilot --prompt "
            Read /tmp/renovate-report.json (Renovate report, keys: problems, repositories).
            Write a GitHub-flavored Markdown summary to /tmp/summary.md with these sections:

            1. Global stats table: total repos, repos with activity, automerged, PRs, pending, errors, warnings
            2. Errors/Warnings table (deduplicated): Repository | Branch/File | Message
            3. Per-repo details (skip repos with only no-work/not-scheduled branches):
               - H3 heading linked to GitHub, dependency managers from packageFiles keys
               - Table: Branch | Update Type | Status | Dependencies | Files
               - Status emojis: automerged=checkmark, error=X, pending=hourglass, done+BranchAutomerge=hourglass
               - Link branches to /tree/<branch>, PRs to /pull/<prNo>, github-tags deps to their repos
               - Show depName currentValue->newValue (max 5), packageFile names (max 3)
            4. Merged branches summary table with total count

            Key fields: branches[].{branchName,result,prNo,prBlockedBy,upgrades[]},
            problems[].{branch,file,msg}, upgrades[].{depName,currentValue,newValue,updateType,datasource,packageFile}
            " --yolo --no-ask-user --no-custom-instruction

      - name: Upload Renovate log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-log
          path: /tmp/renovate-log.json
          retention-days: 1

      - name: Upload Renovate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-report
          path: /tmp/renovate-report.json
          retention-days: 1
