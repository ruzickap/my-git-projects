---
# GitHub Actions workflow for global Renovate dependency management
# Renovate automatically updates dependencies across all non-archived repositories
name: renovate-global

on:
  workflow_dispatch:
    inputs:
      dryRun:
        type: boolean
        description: Dry-Run
  schedule:
    - cron: 1 1 * * *

env:
  # Enable dry-run mode based on the workflow input (https://docs.renovatebot.com/self-hosted-configuration/#dryrun)
  RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || 'null' }}

permissions: read-all

jobs:
  renovate-global:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-checks: read
          permission-metadata: read
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - name: 💡 Self-hosted Renovate
        id: renovate
        uses: renovatebot/github-action@6d859fc95779be83a0335ca704879b47e5d79641 # v46.1.16
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ steps.app-token.outputs.token }}
        env:
          # Write Renovate logs to a file - https://docs.renovatebot.com/config-overview/#logging-variables
          RENOVATE_LOG_FILE: /tmp/renovate-log.json
          # Write a Renovate report to a file - https://docs.renovatebot.com/self-hosted-configuration/#reporttype
          RENOVATE_REPORT_TYPE: file
          RENOVATE_REPORT_PATH: /tmp/renovate-report.json

      - name: Render Renovate summary
        if: always()
        run: |
          set -uo pipefail
          if [[ ! -f /tmp/renovate-report.json ]]; then
            echo "No Renovate report found - skipping summary." >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          if ! python3 ./scripts/renovate-summary/renovate-summary.py /tmp/renovate-report.json >> "${GITHUB_STEP_SUMMARY}"; then
            echo "Failed to render Renovate summary from the report." >> "${GITHUB_STEP_SUMMARY}"
          fi
          exit 0

      - name: Upload Renovate log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-log
          path: /tmp/renovate-log.json
          if-no-files-found: error
          compression-level: 9
          retention-days: 1

      - name: Upload Renovate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-report
          path: /tmp/renovate-report.json
          if-no-files-found: error
          compression-level: 9
          retention-days: 1
