---
# GitHub Actions workflow for global Renovate dependency management
# Renovate automatically updates dependencies across all non-archived repositories
name: renovate-global

on:
  workflow_dispatch:
    inputs:
      dryRun:
        type: boolean
        description: Dry-Run
  # schedule:
  #   - cron: 0 4-6 * * 0

env:
  # keep-sorted start block=yes
  # Automatically discover all repositories accessible by the token
  # https://docs.renovatebot.com/self-hosted-configuration/#autodiscover
  RENOVATE_AUTODISCOVER: "true"
  # Filter autodiscovery to only ${{ github.repository_owner }} repositories, with a few explicit exclusions
  # https://docs.renovatebot.com/self-hosted-configuration/#autodiscoverfilter
  RENOVATE_AUTODISCOVER_FILTER: >-
    [
    "!/^${{ github.repository_owner }}/old_stuff$/",
    "!/^${{ github.repository_owner }}/ruzickovabozena\\.xvx\\.cz$/",
    "!/^${{ github.repository_owner }}/wizcli-terraform-test$/",
    "/^${{ github.repository_owner }}\\/.*/"
    ]
  # Enable dry-run mode based on the workflow input (https://docs.renovatebot.com/self-hosted-configuration/#dryrun)
  RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || 'null' }}
  # Skip archived repositories
  # https://docs.renovatebot.com/self-hosted-configuration/#ignorearchived
  RENOVATE_IGNORE_ARCHIVED: "true"
  # Username for Renovate commits
  # https://docs.renovatebot.com/self-hosted-configuration/#username
  RENOVATE_USERNAME: ${{ github.repository_owner }}
  # keep-sorted end

permissions: read-all

jobs:
  renovate-global:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_CLIENT_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-checks: read
          permission-metadata: read
          permission-statuses: write
          permission-vulnerability-alerts: read
          permission-workflows: write

      - name: 💡 Self-hosted Renovate
        id: renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ steps.app-token.outputs.token }}
          # Override default env-regex to pass LOG_FILE* vars to the Docker container
          # Default only passes LOG_LEVEL; LOG_FILE and LOG_FILE_LEVEL need LOG_\w+
          # https://github.com/renovatebot/github-action#env-regex
          env-regex: "^(?:RENOVATE_\\w+|LOG_\\w+|GITHUB_COM_TOKEN|NODE_OPTIONS|(?:HTTPS?|NO)_PROXY|(?:https?|no)_proxy)$"
        env:
          # Write Renovate logs to a file (JSON format by default) for post-processing
          # https://docs.renovatebot.com/config-overview/#special-environment-variables
          LOG_FILE: /tmp/renovate-log.txt
          LOG_FILE_LEVEL: debug

      - name: Install Copilot CLI
        if: always()
        run: npm install -g @github/copilot

      - name: 📝 Summarize Renovate output
        if: always()
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.MY_COPILOT_TOKEN }}
        run: |
          copilot --prompt "
            Read the file /tmp/renovate-log.txt which contains Renovate bot JSON logs (one JSON object per line).

            Parse the logs and produce a structured Markdown summary written to /tmp/summary.md with these sections:

            ## 1. Header with global statistics
            - Total repositories processed
            - Repositories with activity (any branch created/updated/automerged or errors)
            - Counts: Branches created | Updated | Merged (automerged) | PRs opened | Orphan branches deleted
            - Error count (if any)

            ## 2. Errors and Warnings section (if any exist)
            Table with columns: Repository | Branch | Message
            - Include all log entries with level >= 40
            - Link repository names to https://github.com/<repo>

            ## 3. Repository Details section
            For each repository that had activity (skip repos with no actionable branches):
            - H3 heading linked to the GitHub repo
            - Show dependency managers detected (from msg='Dependency extraction complete' -> stats.managers)
            - Table with columns: Branch | Update Type | Status | Dependencies | Files
              - Branch: link to https://github.com/<repo>/tree/<branch>
              - Update Type: major/minor/patch/digest/mixed (derived from upgrades[].updateType). Link to commit if branchSha available
              - Status with emoji:
                - automerged -> checkmark merged
                - error -> X error
                - pending -> hourglass pending
                - created -> NEW created
                - updated -> arrows updated
                - If PR exists, link to https://github.com/<repo>/pull/<prNo>
                - If prBlockedBy='BranchAutomerge', show 'automerge pending'
              - Dependencies: list each depName with currentValue -> newValue transition. Link GitHub Actions deps to their repos
              - Files: list packageFile names, link to commit diff if branchSha available
            - Show deleted orphan branches (from msg='Deleting orphan branch')
            - Show per-repo errors

            ## 4. Merged Branches summary (if any automerges occurred)
            Table: Repository | Branch (with checkmark emoji)
            Total merged count

            Key log fields to look for:
            - 'repository': which repo the entry belongs to
            - 'msg': event type (e.g., 'Branch automerged', 'Branch created', 'Branch updated', 'Deleting orphan branch', 'PR created', 'Branch summary', 'Dependency extraction complete')
            - 'branch': branch name
            - 'branchesInformation': array with branchName, result, prBlockedBy, prTitle, prNo, upgrades[]
            - 'branches': array in 'Branch summary' messages with branchName, branchSha
            - 'level': log level (>= 40 means error/warning)
            - upgrades[]: contains depName, currentValue, newValue, updateType, datasource, packageFile

            Format as clear GitHub-flavored Markdown. Write the result to /tmp/github_step_summary.md" --yolo --no-ask-user --no-custom-instructions

          cat /tmp/github_step_summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Renovate log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-log
          path: /tmp/renovate-log.txt
          retention-days: 1

      - name: Upload Renovate report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: renovate-report
          path: /tmp/renovate-report.json
          retention-days: 1
