---
# GitHub Actions workflow for Renovate dependency management
# Renovate automatically updates dependencies in your repository
name: renovate-working-days

on:
  workflow_dispatch:
    inputs:
      dryRun:
        type: boolean
        description: Dry-Run
      logLevel:
        type: choice
        description: Log-Level
        default: debug
        options:
          - info
          - debug
          - trace
  schedule:
    - cron: 0 0-1 * * 1-5

env:
  # keep-sorted start
  # Set log level for debugging (info, debug, or trace) https://docs.renovatebot.com/troubleshooting/#log-debug-levels
  LOG_LEVEL: ${{ inputs.logLevel || 'debug' }}
  # Enable automatic merging of dependency updates
  RENOVATE_AUTOMERGE: "true"
  # Set automerge type to branch (merge directly without PR)
  RENOVATE_AUTOMERGE_TYPE: branch
  # Enable dry-run mode for non-main branches to preview changes (https://docs.renovatebot.com/self-hosted-configuration/#dryrun)
  # Run renovate in dry-run mode if executed in branches other than main to prevent updating versions in PRs/branches
  RENOVATE_DRY_RUN: ${{ inputs.dryRun || ( github.head_ref || github.ref_name ) != 'main' || false }}
  # Use platform-native commit signing
  # https://docs.renovatebot.com/configuration-options/#platformcommit
  RENOVATE_PLATFORM_COMMIT: "true"
  # Target repository for Renovate to update
  # https://docs.renovatebot.com/self-hosted-configuration/#repositories
  RENOVATE_REPOSITORIES: ${{ github.repository }}
  # Username for Renovate commits
  # https://docs.renovatebot.com/self-hosted-configuration/#username
  RENOVATE_USERNAME: ${{ github.repository_owner }}
  # keep-sorted end

permissions: read-all

jobs:
  renovate-working-days:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    permissions:
      contents: write # Required to push branches
      pull-requests: write # Required to create/update PRs
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0 # zizmor: ignore[github-app]
        id: app-token
        with:
          client-id: ${{ secrets.MY_RENOVATE_GITHUB_APP_ID }}
          private-key: ${{ secrets.MY_RENOVATE_GITHUB_PRIVATE_KEY }}

      - name: 💡 Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
