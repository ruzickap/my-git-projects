---
# GitHub Actions workflow for OpenTofu tests on the AWS bootstrap module
name: tofu-aws-tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"
  push:
    branches-ignore:
      - main
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"

permissions: read-all

jobs:
  tofu-aws-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read # Required to checkout repository.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_wrapper: false

      - name: Run tofu tests
        working-directory: opentofu/aws
        run: |
          tofu init
          tofu test
