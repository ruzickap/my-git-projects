---
# GitHub Actions workflow for OpenTofu tests on the AWS bootstrap module
name: tofu-aws-tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"
  push:
    branches-ignore:
      - main
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"

permissions: read-all

jobs:
  tofu-aws-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read # Required to checkout repository.
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_wrapper: false

      - name: Run tofu tests
        working-directory: opentofu/aws
        run: |
          tofu init
          tofu test
