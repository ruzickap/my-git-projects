---
# GitHub Actions workflow for OpenTofu tests on the AWS bootstrap module
name: tofu-aws-tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, reopened, synchronize]
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"
  push:
    branches-ignore:
      - main
    paths:
      - opentofu/aws/**
      - "!opentofu/aws/README.md"

permissions: read-all

jobs:
  tofu-aws-test:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 10
    permissions:
      contents: read # Required to checkout repository.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_wrapper: false

      - name: Run tofu tests
        working-directory: opentofu/aws
        run: |
          tofu init
          tofu test
