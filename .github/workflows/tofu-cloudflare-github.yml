---
# GitHub Actions workflow for OpenTofu infrastructure provisioning
# Manages Cloudflare and GitHub resources via Infrastructure as Code
name: tofu-cloudflare-github

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - drift
  pull_request:
    types: [opened, reopened, synchronize, labeled]
    paths:
      - opentofu/cloudflare-github/**
      - "!opentofu/cloudflare-github/README.md"
  push:
    branches: [main]
    paths:
      - opentofu/cloudflare-github/**
      - "!opentofu/cloudflare-github/README.md"
  schedule:
    - cron: "0 0 * * 0"

permissions: read-all

env:
  AWS_REGION: "eu-central-1"
  TF_VAR_opentofu_encryption_passphrase: ${{ secrets.TF_VAR_OPENTOFU_ENCRYPTION_PASSPHRASE }}

jobs:
  tofu-cloudflare-github:
    runs-on: ubuntu-24.04-arm
    permissions:
      actions: read # Required to identify workflow run.
      checks: write # Required to add status summary.
      contents: read # Required to checkout repository.
      id-token: write # Required to assume AWS role via OIDC.
      issues: write # Required to open issue on drift.
      pull-requests: write # Required to add PR comment.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Remove tofu labels from PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --remove-label tofu-apply --remove-label tofu-plan

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1.0.8
        with:
          tofu_wrapper: false

      - uses: op5dev/tf-via-pr@5a4229041e3c90818d85813d4e4a4d44f653d5e9 # v13.7.2
        id: tofu
        with:
          arg-lock: ${{ github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'tofu-apply') || inputs.action == 'apply' }}
          command: ${{ (github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'tofu-apply') || inputs.action == 'apply') && 'apply' || 'plan' }}
          comment-pr: ${{ (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') && 'never' || 'always' }}
          expand-diff: true
          plan-encrypt: ${{ secrets.TF_VAR_OPENTOFU_ENCRYPTION_PASSPHRASE }}
          retention-days: 7
          tool: tofu
          working-directory: opentofu/cloudflare-github

      - name: Open issue on drift
        if: (github.event_name == 'schedule' || inputs.action == 'drift') && steps.tofu.outputs.exitcode != 0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TOFU_OUTPUTS_DIFF: ${{ steps.tofu.outputs.diff }}
          TOFU_OUTPUTS_RUN: ${{ steps.tofu.outputs.run-url }}
          TOFU_OUTPUTS_RESULT: ${{ steps.tofu.outputs.result }}
          TOFU_OUTPUTS_SUMMARY: ${{ steps.tofu.outputs.summary }}
        run: |
          gh api "/repos/{owner}/{repo}/issues" \
            --method POST \
            --field title="Configuration drift detected" \
            --field body="
          ### Diff of changes

          [View log.](${TOFU_OUTPUTS_RUN})

          \`\`\`diff
          ${TOFU_OUTPUTS_DIFF}
          \`\`\`

          \`\`\`hcl
          ${TOFU_OUTPUTS_RESULT}
          \`\`\`
          "
