---
# GitHub Actions Security Analysis with zizmor
# Static analysis tool for finding security issues in GitHub Actions workflows
# https://github.com/zizmorcore/zizmor
name: zizmor

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main
    paths:
      - .github/workflows/**
      - gh-repo-defaults/**

permissions: read-all

jobs:
  zizmor:
    runs-on: ubuntu-24.04-arm
    if: ${{ (!startsWith(github.ref_name, 'chore/renovate/') && !startsWith(github.ref_name, 'release-please--')) || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 5
    permissions:
      contents: read # needed to checkout the repository
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          inputs: |
            .github/workflows/
            gh-repo-defaults/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
