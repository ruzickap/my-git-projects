##########################################################################################
#                                                                                        #
#                       Pre-commit configuration file                                    #
#                                                                                        #
##########################################################################################
# ln -s ~/git/my-git-projects/.pre-commit-config.yaml .pre-commit-config.yaml
# prek install
---
fail_fast: true
# Install commit-msg and pre-push hook types by default so commit-check's
# check-message (commit-msg) and check-no-force-push (pre-push) hooks run.
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push
repos:
  # keep-sorted start newline_separated=yes
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.38.0
    hooks:
      - id: yamllint
        # Skip Helm Charts
        exclude: ^.*/templates/.*\.yaml$
        args:
          - --format=parsable
          - --strict
          - -d
          - >
            {
              extends: relaxed,
              rules: {
                line-length: disable
              }
            }

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.108.0
    hooks:
      - id: terraform_checkov
      - id: terraform_docs
      - id: terraform_fmt
      - id: terraform_tflint
      - id: terraform_trivy
      - id: terraform_validate
      - id: tfupdate
        args:
          - --args=terraform
          - --args=--version "~> 1.12"

  - repo: https://github.com/betterleaks/betterleaks
    rev: v1.6.1
    hooks:
      - id: betterleaks-system

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell

  - repo: https://github.com/commit-check/commit-check
    rev: v2.11.1
    hooks:
      - id: check-message
      - id: check-branch
      - id: check-author-name
      - id: check-author-email
      - id: check-no-force-push

  - repo: https://github.com/google/keep-sorted
    rev: v0.9.1
    hooks:
      - id: keep-sorted

  - repo: https://github.com/mirrors-prettier/mirrors-prettier
    rev: v3.9.5
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.9.5
          - prettier-plugin-sh
          - prettier-plugin-toml
        args:
          - --cache-location=/tmp/.prettier-cache
        # Ignore: [error] No matching files. Patterns: .git/COMMIT_EDITMSG
        exclude: |
          (?x)(
              \.md|
              ^_config\.yml|
              ^_data/contact\.yml|
              ^\.git/COMMIT_EDITMSG$
          )$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-illegal-windows-names
      - id: check-json
        exclude: .*/devcontainer\.json$|settings\.json$
      - id: check-shebang-scripts-are-executable
      - id: check-merge-conflict
      - id: check-symlinks
      - id: check-toml
      - id: check-vcs-permalinks
      - id: check-xml
      - id: destroyed-symlinks
      - id: end-of-file-fixer
        exclude_types: [svg]
      - id: mixed-line-ending
      - id: no-commit-to-branch
      - id: trailing-whitespace

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint-system

  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.30
    hooks:
      - id: rumdl-fmt

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args:
          - --indent=2
          - --space-redirects

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/sirosen/texthooks
    rev: 0.7.1
    hooks:
      - id: fix-smartquotes
      - id: fix-ligatures
      - id: fix-spaces
      - id: forbid-bidi-controls
      - id: alphabetize-codeowners

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.26.1
    hooks:
      - id: zizmor
  # keep-sorted end
