---
# zizmor configuration
# https://docs.zizmor.sh/configuration/
rules:
  artipacked:
    ignore:
      # mega-linter needs persisted credentials for GITHUB_TOKEN usage
      - mega-linter.yml
  dangerous-triggers:
    ignore:
      # pull_request_target is intentionally used here to validate PR titles
      # from forks - this is safe because no code checkout or script execution
      # happens in the workflow
      - semantic-pull-request.yml
